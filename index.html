<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizVerse</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#6a11cb,#2575fc);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      background:#fff;
      padding:40px;
      border-radius:20px;
      width:350px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.3);
    }

    h1{
      color:#2575fc;
      margin-bottom:10px;
    }

    p{
      color:#666;
      margin-bottom:30px;
    }

    button{
      background:#2575fc;
      color:white;
      border:none;
      padding:15px 30px;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      background:#174ea6;
      transform:scale(1.05);
    }
  </style>
</head>

<body>

<div class="card">
  <h1>QuizVerse</h1>
  <p>Welcome to the Ultimate Quiz Game!</p>

  <button onclick="startQuiz()">
    Start Quiz
  </button>
</div>

<script>
function startQuiz(){
  alert("Quiz Coming Soon 🚀");
}
</script>

</body>
</html>
